version: "3.9"

services:
  # ─── Application ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: final
    image: woles-backend:latest
    container_name: woles-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://woles:woles@postgres:5432/woles?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://woles:woles@rabbitmq:5672/
      - STORAGE_ENDPOINT=minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started

  worker:
    build:
      context: .
      target: final
    image: woles-backend:latest
    container_name: woles-worker
    restart: unless-stopped
    command: ["/app/worker"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://woles:woles@postgres:5432/woles?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://woles:woles@rabbitmq:5672/
      - STORAGE_ENDPOINT=minio:9000
    depends_on:
      - api

  scheduler:
    build:
      context: .
      target: final
    image: woles-backend:latest
    container_name: woles-scheduler
    restart: unless-stopped
    command: ["/app/scheduler"]
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://woles:woles@postgres:5432/woles?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://woles:woles@rabbitmq:5672/
    depends_on:
      - api

  # ─── PostgreSQL ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: woles-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: woles
      POSTGRES_PASSWORD: woles
      POSTGRES_DB: woles
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U woles -d woles"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: woles-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: woles-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: woles
      RABBITMQ_DEFAULT_PASS: woles
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── MinIO ────────────────────────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: woles-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  rabbitmqdata:
  miniodata:
