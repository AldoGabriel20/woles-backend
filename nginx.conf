user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ── Security headers (applied globally) ──────────────────────────────────
    add_header X-Content-Type-Options   "nosniff"           always;
    add_header X-Frame-Options          "DENY"              always;
    add_header X-XSS-Protection         "1; mode=block"     always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Upstream: API backend ─────────────────────────────────────────────────
    upstream api_backend {
        server api:8080;
        keepalive 32;
    }

    # ── Upstream: Frontend (Next.js) ──────────────────────────────────────────
    upstream frontend_backend {
        server frontend:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (all hosts) ────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Certbot ACME challenge (HTTP-01)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── api.woles.id — REST API ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name api.woles.id;

        ssl_certificate     /etc/letsencrypt/live/api.woles.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.woles.id/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/api.woles.id/chain.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Max upload size (document files up to 10 MB + headroom)
        client_max_body_size 12m;

        # Proxy to Go Fiber API
        location / {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }

        # Webhook endpoint — larger timeout for async processing
        location /webhooks/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }
    }

    # ── woles.id + www.woles.id — Frontend (Next.js) ─────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name woles.id www.woles.id;

        ssl_certificate     /etc/letsencrypt/live/woles.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/woles.id/privkey.pem;
        ssl_trusted_certificate /etc/letsencrypt/live/woles.id/chain.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://api.woles.id; frame-ancestors 'none';" always;

        client_max_body_size 3m;

        # Next.js static assets — long cache
        location /_next/static/ {
            proxy_pass       http://frontend_backend;
            proxy_cache_valid 200 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Everything else → Next.js server
        location / {
            proxy_pass         http://frontend_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
